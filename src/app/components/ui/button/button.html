<button
  [type]="type"
  [disabled]="disabled || loading"
  [class]="'btn btn-' + variant + ' btn-' + size"
  [class.btn-full-width]="fullWidth"
  [class.btn-loading]="loading"
  (click)="onClick($event)"
>
  @if(loading) {
    <span class="btn-spinner"></span>
  }
  <span [class.btn-content-loading]="loading">
    <ng-content></ng-content>
  </span>
</button>
