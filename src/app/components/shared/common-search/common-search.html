<div class="common-search">
  <div class="search-fields">
    <div class="form-group">
      <label for="nome">Nome</label>
      <input
        id="nome"
        type="text"
        [(ngModel)]="searchData.nome"
        placeholder="Digite o nome"
        class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="matricula">Matrícula</label>
      <input
        id="matricula"
        type="text"
        [(ngModel)]="searchData.matricula"
        placeholder="Digite a matrícula"
        class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="text"
        [(ngModel)]="searchData.email"
        placeholder="Digite o email"
        class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="cpf">CPF</label>
      <input
        id="cpf"
        type="text"
        [(ngModel)]="searchData.cpf"
        placeholder="Digite o CPF"
        class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="cargo">Cargo</label>
      <input
        id="cargo"
        type="text"
        [(ngModel)]="searchData.cargo"
        placeholder="Digite o cargo"
        class="form-control"
      />
    </div>
  </div>

  @if (validationMessage) {
    <div class="validation-message">
      {{ validationMessage }}
    </div>
  }

  <div class="search-actions">
    <button type="button" (click)="onSearch()" class="btn btn-primary">Buscar</button>
    <button type="button" (click)="onClear()" class="btn btn-secondary">Limpar</button>
  </div>
</div>
