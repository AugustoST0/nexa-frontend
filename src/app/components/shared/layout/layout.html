<div class="layout-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">NEXA</h1>
      <p class="logo-subtitle">Gestão de Recursos Humanos</p>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/home" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="Home" [size]="20"></lucide-icon>
        <span>Página Inicial</span>
      </a>
      <a routerLink="/catalogo" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="Folder" [size]="20"></lucide-icon>
        <span>Catálogo</span>
      </a>
      <a routerLink="/colaboradores" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="Users" [size]="20"></lucide-icon>
        <span>Colaboradores</span>
      </a>
      @if (isAdmin()) {
        <a routerLink="/usuarios/cadastro" routerLinkActive="active" class="nav-item">
          <lucide-icon [img]="UserPlus" [size]="20"></lucide-icon>
          <span>Usuários</span>
        </a>
        <a routerLink="/admin/tipos-supervisor" routerLinkActive="active" class="nav-item">
          <lucide-icon [img]="Layers" [size]="20"></lucide-icon>
          <span>Tipos de Supervisão</span>
        </a>
      }
      <a routerLink="/relatorios" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="BarChart3" [size]="20"></lucide-icon>
        <span>Relatórios</span>
      </a>
    </nav>
  </aside>

  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-right">
      <button class="user-menu-trigger" (click)="toggleUserMenu($event)">
        <span class="user-name">{{ nomeUsuario()?.name }}</span>
        <lucide-icon [img]="UserCircle" [size]="32"></lucide-icon>
      </button>
      @if (showUserMenu()) {
        <div class="user-dropdown" (click)="$event.stopPropagation()">
          <button class="user-dropdown-item" (click)="onPerfil()">Meu Perfil</button>
          <button class="user-dropdown-item danger" (click)="onLogout()">Sair</button>
        </div>
      }
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
