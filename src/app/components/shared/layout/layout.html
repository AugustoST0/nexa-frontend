<div class="layout-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">NEXA</h1>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/catalogo" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="Tags" [size]="20"></lucide-icon>
        <span>Catálogo</span>
      </a>
      <a routerLink="/colaboradores" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="Users" [size]="20"></lucide-icon>
        <span>Colaboradores</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <app-button
        variant="ghost"
        [fullWidth]="true"
        (clicked)="onLogout()"
        class="logout-button"
      >
        <lucide-icon [img]="LogOut" [size]="20"></lucide-icon>
        <span>Sair</span>
      </app-button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
